services:
  maho:
    image: mahocommerce/maho:latest
    ports:
      - "8080:8080"
    environment:
      SERVER_NAME: "http://localhost:8080"
      MAGE_IS_DEVELOPER_MODE: 1
    volumes:
      - ../src:/mnt/preorder-src:ro
      - ./entrypoint-overlay.sh:/usr/local/bin/entrypoint-overlay.sh:ro
      - maho_app:/app/app
      - maho_var:/app/var
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ["/usr/local/bin/entrypoint-overlay.sh"]

  db:
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: maho
      MARIADB_USER: maho
      MARIADB_PASSWORD: maho
    volumes:
      - maho_db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 10s
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  maho_db:
  maho_app:
  maho_var:
